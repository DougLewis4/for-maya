<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="For Maya">
  <meta name="theme-color" content="#c9847a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="photos/icon.png">
  <title>For Maya ♡</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Install banner (only appears on iPhone Safari before install) -->
  <div id="install-banner">
    Tap <strong>⬆ Share</strong> then <strong>"Add to Home Screen"</strong> to save this as an app
    <button id="banner-close" aria-label="Dismiss">✕</button>
  </div>

  <div id="app">

    <!-- Header -->
    <header>
      <h1 id="app-title">For Maya <span>♡</span></h1>
      <div id="countdown"></div>
    </header>

    <!-- Weather strip -->
    <div id="weather-strip" style="display:flex; align-items:center; margin:14px 20px 0; background:#f5e8e6; border-radius:12px; padding:10px 0;">
      <div class="weather-city" id="weather-marrakech" style="flex:1; text-align:center;">
        <div class="weather-city-name" style="font-size:0.65rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#a86560; margin-bottom:3px;">Marrakech</div>
        <div class="weather-temp" style="font-size:1rem; font-weight:600; color:#2c2c2c; margin-bottom:2px;">—</div>
        <div class="weather-time" id="time-marrakech" style="font-size:0.7rem; color:#666;">—</div>
      </div>
      <div style="width:1px; height:40px; background:#c9847a; opacity:0.25;"></div>
      <div class="weather-city" id="weather-sandiego" style="flex:1; text-align:center;">
        <div class="weather-city-name" style="font-size:0.65rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#a86560; margin-bottom:3px;">San Diego</div>
        <div class="weather-temp" style="font-size:1rem; font-weight:600; color:#2c2c2c; margin-bottom:2px;">—</div>
        <div class="weather-time" id="time-sandiego" style="font-size:0.7rem; color:#666;">—</div>
      </div>
    </div>

    <!-- Tab bar -->
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active" data-tab="tab-messages" role="tab">Messages</button>
      <button class="tab-btn"        data-tab="tab-gb"       role="tab">GB 🐑</button>
    </nav>

    <!-- ── Tab 1: Daily Messages ─────────────────────────────── -->
    <div class="tab-content">

      <div id="tab-messages" class="tab-pane active" role="tabpanel">
        <div id="messages-list"></div>
      </div>

      <!-- ── Tab 2: GB Tamagotchi ──────────────────────────────── -->
      <div id="tab-gb" class="tab-pane" role="tabpanel">
        <div class="gb-card">

          <!-- GB's photo -->
          <div class="gb-photo-wrap">
            <img
              id="gb-photo"
              src="photos/gb.png"
              alt="GB the lamb"
              class="gb-photo"
              draggable="false"
            >
            <div id="gb-mood-badge" class="gb-mood-badge">🌟</div>
          </div>

          <div class="gb-name">GB</div>
          <div id="gb-mood-text" class="gb-mood-text">GB is happy and loved!</div>

          <!-- Stat bars -->
          <div class="stats">
            <div class="stat-row stat-hunger">
              <div class="stat-label">Hunger</div>
              <div class="stat-bar-bg">
                <div class="stat-bar-fill" style="width: 100%"></div>
              </div>
              <div class="stat-pct">100%</div>
            </div>
            <div class="stat-row stat-happiness">
              <div class="stat-label">Happiness</div>
              <div class="stat-bar-bg">
                <div class="stat-bar-fill" style="width: 100%"></div>
              </div>
              <div class="stat-pct">100%</div>
            </div>
            <div class="stat-row stat-energy">
              <div class="stat-label">Energy</div>
              <div class="stat-bar-bg">
                <div class="stat-bar-fill" style="width: 100%"></div>
              </div>
              <div class="stat-pct">100%</div>
            </div>
          </div>

          <!-- Action buttons -->
          <div class="action-btns">
            <button id="btn-feed" class="btn btn-feed" onclick="GB.feed()">🍼 Feed GB</button>
            <button id="btn-play" class="btn btn-play" onclick="GB.play()">⭐ Play</button>
          </div>

          <p id="gb-last-fed" class="last-fed">GB is waiting for you...</p>
        </div>
      </div>

    </div><!-- /tab-content -->

  </div><!-- /app -->

  <!-- ── Message Detail Panel ─────────────────────────────────── -->
  <div id="message-panel" class="message-panel" aria-hidden="true">
    <div class="message-panel-inner">
      <div class="message-panel-header">
        <button id="message-back" class="message-back-btn" aria-label="Back">&#8592; Back</button>
      </div>
      <div class="message-panel-body">
        <img id="message-panel-photo" class="message-panel-photo" src="" alt="" onerror="this.style.display='none'">
        <div id="message-panel-label" class="message-panel-label"></div>
        <div id="message-panel-date"  class="message-panel-date"></div>
        <div id="message-panel-text"  class="message-panel-text"></div>
        <a id="message-panel-song" class="btn-spotify" target="_blank" rel="noopener" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          Song of the Day
        </a>
      </div>
    </div>
  </div>

  <!-- ── Overlays ─────────────────────────────────────────────── -->

  <!-- Feed video overlay -->
  <div id="feed-video-overlay" class="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box video-box">
      <video
        id="gb-feed-video"
        src="photos/gb-eats.mp4"
        playsinline
        preload="auto"
        style="width:100%; border-radius:12px; display:block;"
      ></video>
    </div>
  </div>

  <!-- Play video overlay -->
  <div id="play-video-overlay" class="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box video-box">
      <video
        id="gb-play-video"
        src="photos/gb-dance.mp4"
        playsinline
        preload="auto"
        style="width:100%; border-radius:12px; display:block;"
      ></video>
    </div>
  </div>

  <!-- Easter egg: secret message (tap title 5x) -->
  <div id="secret-overlay" class="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box">
      <h2 id="secret-title"></h2>
      <p  id="secret-message"></p>
      <button class="overlay-close">Close</button>
    </div>
  </div>

  <!-- Easter egg: couple photo (long-press GB) -->
  <div id="photo-overlay" class="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box">
      <!--
        ✏️ DOUG: Replace "photos/us.jpg" with your actual photo filename.
           Drop the photo into the /photos/ folder in this project.
      -->
      <img src="photos/us.jpg" alt="Us" class="overlay-photo" onerror="this.style.display='none'">
      <p style="font-family: Georgia, serif; font-style: italic;">Missing you ♡</p>
      <button class="overlay-close">Close</button>
    </div>
  </div>

  <!-- Flash feedback (feed/play animations) -->
  <div id="feed-flash" class="feed-flash"></div>

  <script src="gb.js"></script>
  <script src="app.js"></script>
</body>
</html>
